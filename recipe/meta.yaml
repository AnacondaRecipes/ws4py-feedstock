{% set name = "ws4py" %}
{% set version = "0.5.1" %}
{% set bundle = "tar.gz" %}
{% set hash_type = "sha256" %}
{% set hash = "29d073d7f2e006373e6a848b1d00951a1107eb81f3742952be905429dc5a5483" %}
{% set build = 1 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.{{ bundle }}
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.{{ bundle }}
  {{ hash_type }}: {{ hash }}

build:
  number: 1
  script: pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv

requirements:
  host:
    - python
    - setuptools
    - pip
    - wheel
  run:
    - python

test:
  imports:
    - ws4py
    - ws4py.client
    - ws4py.server
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/Lawouach/WebSocket-for-Python
  license_file:  LICENSE
  license: BSD-3-Clause
  license_family: BSD
  summary: 'WebSocket client and server library for Python 2, 3, and PyPy'
  dev_url: https://github.com/Lawouach/WebSocket-for-Python
  doc_url: https://ws4py.readthedocs.io

extra:
  recipe-maintainers:
    - pmlandwehr
